<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>P1 Tool-call Loading 持久性 - 2026-07-14</title>
  <style>
    :root { color-scheme: light; --page:#f6f7f9; --panel:#fff; --ink:#171a21; --muted:#646d7b; --line:#e1e6ef; --ok:#157f4f; --accent:#285cc8; --accent-soft:#eef4ff; --orange:#e96f1c; --orange-soft:#fff3ea; --shadow:0 10px 28px rgba(23,26,33,.08); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:linear-gradient(180deg,#fff 0,#fff 128px,var(--page) 128px); background-color:var(--page); background-repeat:no-repeat; color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; line-height:1.45; }
    main { width:min(1080px,100%); margin:0 auto; padding:28px 28px 56px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:18px; padding:6px 0 24px; }
    h1 { margin:0; font-size:32px; line-height:1.1; font-weight:850; }
    a { color:var(--accent); text-decoration:none; }
    .brand-tile { width:42px; height:42px; border:1px solid #f2c39d; border-radius:8px; background:var(--orange-soft); color:var(--orange); display:grid; place-items:center; font-size:13px; font-weight:850; line-height:1; flex:0 0 auto; }
    .summary { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin:0 0 22px; }
    .metric { min-width:0; padding:12px; border:1px solid var(--line); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); }
    .metric span { display:block; color:var(--muted); font-size:12px; margin-bottom:6px; }
    .metric strong { display:block; font-size:15px; overflow-wrap:anywhere; }
    .metric.ok strong { color:var(--ok); }
    .section { border:1px solid var(--line); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); padding:16px; margin:0 0 18px; }
    .section-head { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin:0 0 12px; }
    .section-head h2 { margin:0; font-size:19px; }
    .badge { border:1px solid #b7e2cd; border-radius:999px; color:var(--ok); background:#eefaf3; padding:2px 8px; font-size:12px; font-weight:750; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
    figure { margin:0; border:1px solid var(--line); border-radius:8px; overflow:hidden; background:#fff; }
    img,video { display:block; width:100%; height:auto; background:#fff; }
    figcaption { padding:10px 12px; color:var(--muted); font-size:14px; border-top:1px solid var(--line); }
    .note { color:var(--muted); font-size:14px; margin:4px 0 0; }
    @media (max-width:760px) { main { padding:18px 14px 40px; } h1 { font-size:27px; } .summary,.grid { grid-template-columns:1fr; } .section { padding:12px; } .section-head { display:grid; } }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <a href="../../../../">iBoxClaw 自动化测试</a>
        <h1>P1 Tool-call Loading 持久性</h1>
      </div>
      <div class="brand-tile" aria-hidden="true">P1</div>
    </header>
    <section class="summary" aria-label="执行摘要">
      <div class="metric ok"><span>结果</span><strong>通过</strong></div>
      <div class="metric"><span>日期</span><strong>2026-07-14</strong></div>
      <div class="metric"><span>范围</span><strong>P1 Tool-call Loading 持久性</strong></div>
      <div class="metric"><span>证据</span><strong>2 张截图 / 1 段录屏</strong></div>
    </section>
    <section class="section">
      <div class="section-head">
        <h2>Tool-call 回复</h2>
        <span class="badge">通过</span>
      </div>
      <p class="note">发送天气查询触发 tool call，验证 loading 在回复过程中可见、最终消失、composer 恢复可编辑。</p>
      <div class="grid">
        <figure>
          <img src="assets/01-before-send.jpg" alt="消息已填写" />
          <figcaption>消息已填写</figcaption>
        </figure>
        <figure>
          <img src="assets/02-after-reply.jpg" alt="回复完成，loading 已复位" />
          <figcaption>回复完成，loading 已复位</figcaption>
        </figure>
        <figure>
          <video controls preload="metadata" src="assets/recording.mp4"></video>
          <figcaption>全过程录屏</figcaption>
        </figure>
      </div>
    </section>
  </main>
</body>
</html>
