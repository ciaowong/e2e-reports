<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>E2E 报告 - 2026-07-17</title>
  <style>
:root {
      color-scheme: light;
      --page: #f6f7f9;
      --panel: #ffffff;
      --panel-soft: #fbfcfe;
      --ink: #171a21;
      --muted: #646d7b;
      --line: #e1e6ef;
      --line-strong: #cfd7e5;
      --ok: #157f4f;
      --warn: #a44900;
      --accent: #285cc8;
      --accent-soft: #eef4ff;
      --orange: #e96f1c;
      --orange-soft: #fff3ea;
      --teal: #0f7f6d;
      --teal-soft: #eaf8f5;
      --shadow: 0 10px 28px rgba(23, 26, 33, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #ffffff 0, #ffffff 136px, var(--page) 136px);
      background-color: var(--page);
      background-repeat: no-repeat;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }
    main {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 28px 28px 56px;
    }
    header {
      padding: 6px 0 16px;
      border-bottom: 1px solid var(--line);
    }
    .page-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 6px 0 26px;
      border-bottom: 0;
    }
    h1 {
      margin: 8px 0 0;
      font-size: 34px;
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 850;
    }
    .page-head h1 {
      margin: 0;
    }
    h2 {
      margin: 30px 0 12px;
      font-size: 20px;
      letter-spacing: 0;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    nav, .group-heading, .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      align-items: baseline;
    }
    nav {
      font-size: 14px;
    }
    .subtitle, .group-heading p, .note {
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .brand-tile {
      width: 42px;
      height: 42px;
      border: 1px solid #f2c39d;
      border-radius: 8px;
      background: var(--orange-soft);
      color: var(--orange);
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 850;
      line-height: 1;
      flex: 0 0 auto;
    }
    .catalog {
      display: grid;
      gap: 14px;
    }
    .portal-grid {
      display: grid;
      gap: 14px;
      margin: 18px 0 24px;
    }
    .portal-card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      min-height: 112px;
      padding: 16px 18px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      color: var(--ink);
    }
    .portal-card:hover {
      border-color: #b7c8ee;
      background: var(--accent-soft);
      text-decoration: none;
    }
    .portal-card.ops:hover {
      border-color: #b8e2db;
      background: var(--teal-soft);
    }
    .portal-card h2 {
      margin: 0 0 6px;
      font-size: 19px;
      letter-spacing: 0;
    }
    .portal-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .portal-kicker {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      margin-bottom: 10px;
      padding: 2px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fafafa;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }
    .portal-arrow {
      color: var(--muted);
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }
    .section-title {
      margin: 26px 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }
    .metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 16px 0 20px;
    }
    .metric, .report-card {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .metric strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 15px;
    }
    .report-list {
      display: grid;
      gap: 12px;
      margin-top: 14px;
    }
    .report-card h2 {
      margin: 0 0 6px;
      font-size: 17px;
    }
    .report-card p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 14px;
      overflow-wrap: anywhere;
    }
    .badge {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 12px;
      background: #fafafa;
    }
    .badge.ok {
      border-color: #b7e2cd;
      color: var(--ok);
      background: #eefaf3;
      font-weight: 700;
    }
    .badge.warn {
      border-color: #ffd0a8;
      color: var(--warn);
      background: #fff3e8;
      font-weight: 700;
    }
    details {
      background: transparent;
    }
    summary {
      cursor: pointer;
      list-style: none;
      user-select: none;
    }
    summary::-webkit-details-marker {
      display: none;
    }
    summary:focus-visible,
    a:focus-visible {
      outline: 3px solid rgba(40, 92, 200, 0.24);
      outline-offset: 3px;
    }
    .module {
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .module-summary,
    .feature-summary,
    .date-summary {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
    }
    .module-summary {
      min-height: 72px;
      padding: 0 18px;
      border-left: 5px solid var(--orange);
    }
    .module.p1 .module-summary {
      border-left-color: var(--teal);
    }
    .summary-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .tier {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 38px;
      height: 26px;
      border: 1px solid #f1c7a5;
      border-radius: 999px;
      background: var(--orange-soft);
      color: #9f4300;
      font-size: 12px;
      font-weight: 850;
      line-height: 1;
      letter-spacing: 0;
      white-space: nowrap;
    }
    .module.p1 .tier {
      border-color: #b8e2db;
      background: var(--teal-soft);
      color: #086354;
    }
    .summary-text {
      min-width: 0;
      display: grid;
      gap: 2px;
    }
    .module-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 19px;
      font-weight: 850;
    }
    .module-subtitle {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }
    .summary-side {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .chevron {
      width: 9px;
      height: 9px;
      border-right: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(-45deg);
      transition: transform 0.16s ease;
    }
    details[open] > summary .chevron {
      transform: rotate(45deg);
    }

    .feature-flat {
      padding: 12px 0;
      border-top: 1px solid var(--line);
    }
    .feature-flat .feature-name {
      display: block;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .feature-flat .report-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .module-body {
      border-top: 1px solid var(--line);
      background: var(--panel-soft);
      padding: 8px 12px 14px;
    }
    .feature + .feature {
      border-top: 1px solid var(--line);
    }
    .feature-summary {
      min-height: 52px;
      padding: 0 6px 0 10px;
      border-radius: 8px;
    }
    .feature-summary:hover,
    .date-summary:hover {
      background: #ffffff;
    }
    .feature-name {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-size: 15px;
      font-weight: 800;
    }
    .feature-name::before {
      content: "";
      width: 6px;
      height: 24px;
      border-radius: 999px;
      background: var(--accent);
      flex: 0 0 auto;
    }
    .feature.media .feature-name::before {
      background: var(--teal);
    }
    .date {
      margin-left: 16px;
      border-left: 1px solid var(--line);
    }
    .date-summary {
      min-height: 44px;
      padding: 0 8px 0 16px;
      color: var(--muted);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      font-weight: 750;
    }
    .module-body .report-list {
      gap: 8px;
      margin: 0 0 14px 16px;
      padding: 2px 0 0 16px;
      border-left: 1px solid var(--line);
    }
    .report-link {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 14px;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      text-decoration: none;
    }
    .report-link:hover {
      border-color: #b7c8ee;
      background: var(--accent-soft);
      text-decoration: none;
    }
    span.report-link:hover {
      border-color: var(--line);
      background: #ffffff;
    }
    .report-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 780;
    }
    .report-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    figure {
      margin: 0 0 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--panel);
    }
    img, video {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }
    figcaption {
      padding: 10px 12px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }
    @media (min-width: 760px) {
      .metrics {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      .report-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .portal-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .module-body .report-list {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 720px) {
      body {
        background: linear-gradient(180deg, #ffffff 0, #ffffff 112px, var(--page) 112px);
        background-color: var(--page);
        background-repeat: no-repeat;
      }
      main {
        padding: 18px 14px 40px;
      }
      .page-head {
        padding-bottom: 18px;
      }
      h1 {
        font-size: 27px;
      }
      .brand-tile {
        width: 38px;
        height: 38px;
      }
      .module-summary {
        min-height: 66px;
        padding-right: 14px;
      }
      .summary-main {
        gap: 9px;
      }
      .tier {
        min-width: 34px;
        height: 24px;
      }
      .module-title {
        font-size: 17px;
      }
      .module-subtitle,
      .summary-side .count {
        display: none;
      }
      .module-body {
        padding: 6px 8px 10px;
      }
      .feature-summary {
        min-height: 48px;
        padding-left: 6px;
      }
      .date {
        margin-left: 10px;
      }
      .module-body .report-list {
        margin-left: 10px;
        padding-left: 10px;
      }
      .report-link {
        grid-template-columns: 1fr;
        gap: 3px;
      }
      .portal-card {
        grid-template-columns: 1fr;
        min-height: 0;
      }
      .portal-arrow {
        display: none;
      }
      .report-title {
        white-space: normal;
        overflow-wrap: anywhere;
      }
    }
  </style>
</head>
<body>
  <main>
      <header>
        <nav><a href="../../">全部报告</a></nav>
        <h1>2026-07-17</h1>
        <p class="subtitle">这一天上传的报告按功能归类。</p>
      </header>
      <div class="metrics">
        <article class="metric"><span>报告</span><strong>1</strong></article>
        <article class="metric"><span>录屏</span><strong>1</strong></article>
        <article class="metric"><span>截图</span><strong>8</strong></article>
        <article class="metric"><span>门禁</span><strong>录屏齐全</strong></article>
      </div>
      <section class="catalog">
      <details class="feature" open>
        <summary class="feature-summary">
          <span class="feature-name">P0 端到端一气呵成回归</span>
          <span class="summary-side"><span class="count">1 份报告</span><span class="chevron" aria-hidden="true"></span></span>
        </summary>
          <div class="report-list">
        <a class="report-link" href="reports/2026-07-17/p0-e2e-smoke/085154-p0-e2e/">
          <span class="report-title">P0 端到端一气呵成回归</span>
          <span class="report-meta">8 图 / 1 录屏</span>
        </a>
          </div>
      </details>
      </section>
  </main>
</body>
</html>
